<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Droid Survair COG Streaming PoC</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <main class="app">
    <section class="toolbar">
      <div class="brand">
        <span class="brand-mark">DS</span>
        <span>
          <strong>Droid Survair</strong>
          <small>COG Streaming PoC</small>
        </span>
      </div>

      <div class="toolbar-group">
        <select id="categorySelect" class="control" aria-label="Upload type">
          <option value="ortho">Orthomosaic</option>
          <option value="dtm">DTM</option>
          <option value="dsm">DSM</option>
        </select>
        <input id="fileInput" class="control file-control" type="file" accept=".tif,.tiff" />
        <button id="convertButton" class="button primary" type="button">
          <i class="fa-solid fa-layer-group"></i>
          Convert &amp; View
        </button>
      </div>

      <div class="toolbar-group">
        <input id="folderInput" class="control file-control" type="file" webkitdirectory directory multiple />
        <button id="bulkButton" class="button" type="button">
          <i class="fa-solid fa-gears"></i>
          Process Folder
        </button>
      </div>

      <div class="toolbar-group cog-tools">
        <select id="cogSelect" class="control cog-select" aria-label="Converted COG list">
          <option value="">Loading converted COGs...</option>
        </select>
        <button id="viewCogButton" class="button" type="button">
          <i class="fa-solid fa-eye"></i>
          View
        </button>
        <button id="refreshCogsButton" class="button subtle" type="button">
          <i class="fa-solid fa-rotate"></i>
          Refresh
        </button>
      </div>

      <div id="exportSection" class="toolbar-group export-section">
        <label class="interval-label" for="gridInterval">Grid Interval (m)</label>
        <input id="gridInterval" class="control interval-input" type="number" step="0.1" min="0.1" />
        <button id="exportCsvButton" class="button primary" type="button">
          <i class="fa-solid fa-file-csv"></i>
          Export CSV
        </button>
        <button id="exportDxfButton" class="button" type="button">
          <i class="fa-solid fa-draw-polygon"></i>
          Export DXF
        </button>
      </div>

      <div id="terrain3dSection" class="toolbar-group terrain3d-section">
        <label class="interval-label" for="meshStep">3D Step</label>
        <input id="meshStep" class="control interval-input" type="number" step="1" min="1" max="64" value="4" />
        <label class="interval-label" for="meshGrid">Grid</label>
        <input id="meshGrid" class="control interval-input" type="number" step="1" min="1" max="1" value="1" disabled />
        <label class="interval-label" for="verticalExag">Exag</label>
        <input id="verticalExag" class="control interval-input" type="number" step="0.5" min="0.5" max="20" value="1" />
        <button id="generate3dButton" class="button primary" type="button">
          <i class="fa-solid fa-cube"></i>
          Generate 3D
        </button>
        <button id="open3dButton" class="button" type="button" disabled>
          <i class="fa-solid fa-up-right-from-square"></i>
          Open 3D
        </button>
      </div>

      <div id="status" class="status">Ready</div>
    </section>

    <section class="map-shell">
      <div id="map"></div>
      <aside id="legend" class="legend" aria-label="Elevation color legend">
        <div id="legendTitle" class="legend-title">DTM Elevation</div>
        <div class="legend-body">
          <div class="legend-ramp"></div>
          <div class="legend-labels">
            <span id="legendMax">High</span>
            <span id="legendMid">Mid</span>
            <span id="legendMin">Low</span>
          </div>
        </div>
        <div class="legend-note">Agisoft elevation ramp</div>
      </aside>
    </section>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script>
    const fileInput = document.getElementById("fileInput");
    const folderInput = document.getElementById("folderInput");
    const categorySelect = document.getElementById("categorySelect");
    const convertButton = document.getElementById("convertButton");
    const bulkButton = document.getElementById("bulkButton");
    const cogSelect = document.getElementById("cogSelect");
    const viewCogButton = document.getElementById("viewCogButton");
    const refreshCogsButton = document.getElementById("refreshCogsButton");
    const exportSection = document.getElementById("exportSection");
    const gridInterval = document.getElementById("gridInterval");
    const exportCsvButton = document.getElementById("exportCsvButton");
    const exportDxfButton = document.getElementById("exportDxfButton");
    const terrain3dSection = document.getElementById("terrain3dSection");
    const meshStep = document.getElementById("meshStep");
    const meshGrid = document.getElementById("meshGrid");
    const verticalExag = document.getElementById("verticalExag");
    const generate3dButton = document.getElementById("generate3dButton");
    const open3dButton = document.getElementById("open3dButton");
    const statusEl = document.getElementById("status");
    const legend = document.getElementById("legend");
    const legendTitle = document.getElementById("legendTitle");
    const legendMax = document.getElementById("legendMax");
    const legendMid = document.getElementById("legendMid");
    const legendMin = document.getElementById("legendMin");

    gridInterval.value = localStorage.getItem("dtmGridInterval") || "2.0";

    const map = L.map("map", {
      preferCanvas: true,
      worldCopyJump: true,
    }).setView([20, 0], 2);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 22,
      attribution: "&copy; OpenStreetMap contributors",
    }).addTo(map);

    let cogLayer = null;
    let cogCatalog = new Map();
    let activeCogMeta = null;

    function setStatus(message, isError = false) {
      statusEl.textContent = message;
      statusEl.classList.toggle("error", isError);
    }

    function buildTileUrl(filename, cogMeta = {}) {
      const encodedFilename = encodeURIComponent(filename);
      const params = new URLSearchParams();
      const category = (cogMeta.category || "ortho").toLowerCase();
      const rescale = cogMeta.rescale;

      if (cogMeta.modified) {
        params.set("v", cogMeta.modified);
      }

      if ((category === "dtm" || category === "dsm") && rescale && rescale.min !== undefined && rescale.max !== undefined) {
        params.set("colormap_name", "agisoft_dem");
        params.set("rescale", `${rescale.min},${rescale.max}`);
      }

      const query = params.toString();
      return `${window.location.origin}/cog-tiles/${encodedFilename}/{z}/{x}/{y}.png${query ? `?${query}` : ""}`;
    }

    async function fetchCogBounds(filename) {
      const response = await fetch(`${window.location.origin}/cog-bounds/${encodeURIComponent(filename)}`);

      if (!response.ok) {
        const message = await response.text();
        throw new Error(message || "Could not read raster bounds.");
      }

      return response.json();
    }

    function getLeafletBounds(boundsResponse) {
      const bounds = boundsResponse.bounds || boundsResponse;

      if (!Array.isArray(bounds) || bounds.length !== 4) {
        throw new Error("Unexpected bounds response.");
      }

      const [west, south, east, north] = bounds;
      return [[south, west], [north, east]];
    }

    function formatElevation(value) {
      if (value === undefined || value === null || Number.isNaN(Number(value))) {
        return "-";
      }

      return `${Number(value).toLocaleString(undefined, { maximumFractionDigits: 2 })} m`;
    }

    function updateLegend(cogMeta = {}) {
      const category = (cogMeta.category || "ortho").toLowerCase();
      const rescale = cogMeta.rescale;

      if ((category !== "dtm" && category !== "dsm") || !rescale) {
        legend.classList.remove("visible");
        return;
      }

      const min = Number(rescale.min);
      const max = Number(rescale.max);
      const mid = min + ((max - min) / 2);

      legendTitle.textContent = category === "dsm" ? "DSM Elevation" : "DTM Elevation";
      legendMax.textContent = formatElevation(max);
      legendMid.textContent = formatElevation(mid);
      legendMin.textContent = formatElevation(min);
      legend.classList.add("visible");
    }

    function updateExportSection(cogMeta = null) {
      activeCogMeta = cogMeta;
      const category = (cogMeta?.category || "").toLowerCase();
      const isElevation = Boolean(cogMeta?.filename && (category === "dtm" || category === "dsm"));

      exportSection.style.display = isElevation ? "flex" : "none";
      exportCsvButton.disabled = !isElevation;
      exportDxfButton.disabled = !isElevation;
      updateTerrain3dSection(cogMeta, isElevation);
    }

    function updateTerrain3dSection(cogMeta = null, isElevation = false) {
      terrain3dSection.style.display = isElevation ? "flex" : "none";
      generate3dButton.disabled = !isElevation;
      open3dButton.disabled = !(isElevation && cogMeta?.terrain3d?.viewer_url);
      open3dButton.dataset.viewerUrl = cogMeta?.terrain3d?.viewer_url || "";
    }

    async function loadCogList(selectedFilename = "") {
      const response = await fetch("/cogs");

      if (!response.ok) {
        cogSelect.innerHTML = `<option value="">Could not load COG list</option>`;
        return;
      }

      const result = await response.json();
      const cogs = result.cogs || [];
      cogCatalog = new Map(cogs.map((cog) => [cog.filename, cog]));
      cogSelect.innerHTML = "";

      if (!cogs.length) {
        cogSelect.append(new Option("No converted COGs yet", ""));
        updateExportSection(null);
        return;
      }

      const groups = [
        ["ortho", "Orthomosaic"],
        ["dtm", "DTM"],
        ["dsm", "DSM"],
      ];

      for (const [category, label] of groups) {
        const categoryCogs = cogs.filter((cog) => cog.valid && (cog.category || "ortho") === category);

        if (!categoryCogs.length) {
          continue;
        }

        const group = document.createElement("optgroup");
        group.label = label;

        for (const cog of categoryCogs) {
          const rescaleText = cog.rescale ? ` · ${cog.rescale.min} to ${cog.rescale.max}` : "";
          const option = new Option(`${cog.filename} (${cog.size_mb} MB${rescaleText})`, cog.filename);
          option.title = "Ready to view";
          group.append(option);
        }

        cogSelect.append(group);
      }

      const invalidCogs = cogs.filter((cog) => !cog.valid);
      if (invalidCogs.length) {
        const group = document.createElement("optgroup");
        group.label = "Needs reconversion";

        for (const cog of invalidCogs) {
          const option = new Option(`${cog.filename} - ${cog.error || "invalid"}`, cog.filename);
          option.disabled = true;
          group.append(option);
        }

        cogSelect.append(group);
      }

      if (!cogSelect.options.length) {
        cogSelect.append(new Option("No valid converted COGs", ""));
      }

      if (selectedFilename) {
        cogSelect.value = selectedFilename;
      }
    }

    async function viewCog(filename) {
      if (!filename) {
        setStatus("Choose a converted COG from the list.", true);
        updateExportSection(null);
        return;
      }

      setStatus("Loading COG...");
      const boundsResponse = await fetchCogBounds(filename);
      const leafletBounds = getLeafletBounds(boundsResponse);
      const cogMeta = cogCatalog.get(filename) || { filename };
      const tileUrl = buildTileUrl(filename, cogMeta);

      if (cogLayer) {
        map.removeLayer(cogLayer);
      }

      cogLayer = L.tileLayer(tileUrl, {
        tileSize: 256,
        opacity: (cogMeta.category === "dtm" || cogMeta.category === "dsm") ? 1 : 0.88,
        bounds: leafletBounds,
        maxZoom: 22,
        keepBuffer: 1,
        updateWhenIdle: true,
        attribution: "COG via TiTiler",
      }).addTo(map);

      map.setMaxBounds(L.latLngBounds(leafletBounds).pad(0.5));
      map.fitBounds(leafletBounds, { padding: [24, 24] });
      updateLegend(cogMeta);
      updateExportSection(cogMeta);
      setStatus(`Viewing ${filename}`);
    }

    function triggerGridExport(format) {
      const filename = activeCogMeta?.filename || cogSelect.value;
      const interval = Number(gridInterval.value);

      if (!filename) {
        setStatus("Select a DTM or DSM COG before exporting.", true);
        return;
      }

      if (!Number.isFinite(interval) || interval < 0.1) {
        setStatus("Enter a valid grid interval of 0.1 m or greater.", true);
        return;
      }

      localStorage.setItem("dtmGridInterval", String(interval));
      const params = new URLSearchParams({
        filename,
        interval: String(interval),
        format,
      });
      window.location.href = `/export-grid?${params.toString()}`;
      setStatus(`Grid ${format.toUpperCase()} export started at ${interval} m interval.`);
    }

    async function generate3dTerrain() {
      const filename = activeCogMeta?.filename || cogSelect.value;

      if (!filename) {
        setStatus("Select a DTM or DSM COG before generating 3D.", true);
        return;
      }

      const step = Number(meshStep.value);
      const grid = Number(meshGrid.value);
      const exag = Number(verticalExag.value);

      if (!Number.isFinite(step) || step < 1 || !Number.isFinite(grid) || grid < 1 || !Number.isFinite(exag) || exag <= 0) {
        setStatus("Enter valid 3D mesh settings.", true);
        return;
      }

      const formData = new FormData();
      formData.append("filename", filename);
      formData.append("mesh_step", String(Math.round(step)));
      formData.append("mesh_grid", String(Math.round(grid)));
      formData.append("vertical_exag", String(exag));
      formData.append("force", "true");

      generate3dButton.disabled = true;
      open3dButton.disabled = true;
      const startedAt = performance.now();
      const timer = window.setInterval(() => {
        const elapsedSeconds = ((performance.now() - startedAt) / 1000).toFixed(1);
        setStatus(`Generating 3D terrain... ${elapsedSeconds}s`);
      }, 500);

      try {
        const response = await fetch("/generate-3d", {
          method: "POST",
          body: formData,
        });
        const result = await response.json();

        if (!response.ok) {
          throw new Error(result.detail || "3D terrain generation failed.");
        }

        await loadCogList(result.filename);
        const updatedMeta = cogCatalog.get(result.filename) || activeCogMeta;
        updateExportSection(updatedMeta);
        open3dButton.dataset.viewerUrl = result.viewer_url;
        open3dButton.disabled = false;
        window.open(result.viewer_url, "_blank");
        setStatus(result.reused ? "Existing 3D terrain opened." : `3D terrain generated in ${result.seconds}s.`);
      } catch (error) {
        console.error(error);
        setStatus(error.message || "3D terrain generation failed.", true);
      } finally {
        window.clearInterval(timer);
        generate3dButton.disabled = false;
      }
    }

    convertButton.addEventListener("click", async () => {
      const file = fileInput.files[0];

      if (!file) {
        setStatus("Choose a GeoTIFF first.", true);
        return;
      }

      const formData = new FormData();
      formData.append("file", file);
      formData.append("category", categorySelect.value);
      convertButton.disabled = true;
      const startedAt = performance.now();
      const timer = window.setInterval(() => {
        const elapsedSeconds = ((performance.now() - startedAt) / 1000).toFixed(1);
        setStatus(`Uploading and converting... ${elapsedSeconds}s`);
      }, 250);

      try {
        const response = await fetch("/upload-and-convert", {
          method: "POST",
          body: formData,
        });
        const result = await response.json();

        if (!response.ok) {
          throw new Error(result.detail || "Upload failed.");
        }

        await loadCogList(result.filename);
        await viewCog(result.filename);
        const rescaleText = result.rescale ? ` · Rescale: ${result.rescale.min} to ${result.rescale.max}` : "";
        const timingText = result.reused
          ? `Existing valid COG used · Upload check: ${result.upload_seconds}s · Total: ${result.total_seconds}s`
          : `Converted new COG · Upload: ${result.upload_seconds}s · COG: ${result.conversion_seconds}s · Total: ${result.total_seconds}s`;
        setStatus(`${timingText}${rescaleText}`);
      } catch (error) {
        console.error(error);
        setStatus(error.message || "Something went wrong.", true);
      } finally {
        window.clearInterval(timer);
        convertButton.disabled = false;
      }
    });

    bulkButton.addEventListener("click", async () => {
      const files = Array.from(folderInput.files || []).filter((file) => /\.(tif|tiff)$/i.test(file.name));

      if (!files.length) {
        setStatus("Choose a folder containing TIFF files.", true);
        return;
      }

      const formData = new FormData();
      for (const file of files) {
        formData.append("files", file, file.webkitRelativePath || file.name);
      }

      bulkButton.disabled = true;
      convertButton.disabled = true;
      const startedAt = performance.now();
      const timer = window.setInterval(() => {
        const elapsedSeconds = ((performance.now() - startedAt) / 1000).toFixed(1);
        setStatus(`Processing folder... ${elapsedSeconds}s`);
      }, 250);

      try {
        const response = await fetch("/bulk-upload-and-convert", {
          method: "POST",
          body: formData,
        });
        const result = await response.json();

        if (!response.ok) {
          throw new Error(result.detail || "Bulk processing failed.");
        }

        const firstViewable = (result.results || []).find((item) => item.filename && (item.status === "converted" || item.status === "reused"));
        await loadCogList(firstViewable ? firstViewable.filename : cogSelect.value);

        if (firstViewable) {
          await viewCog(firstViewable.filename);
        }

        const summary = result.summary || {};
        setStatus(`Bulk complete · Converted: ${summary.converted || 0} · Reused: ${summary.reused || 0} · Skipped: ${summary.skipped || 0} · Failed: ${summary.failed || 0}`);
      } catch (error) {
        console.error(error);
        setStatus(error.message || "Bulk processing failed.", true);
      } finally {
        window.clearInterval(timer);
        bulkButton.disabled = false;
        convertButton.disabled = false;
      }
    });

    viewCogButton.addEventListener("click", async () => {
      viewCogButton.disabled = true;

      try {
        await viewCog(cogSelect.value);
      } catch (error) {
        console.error(error);
        setStatus(error.message || "Could not view selected COG.", true);
      } finally {
        viewCogButton.disabled = false;
      }
    });

    refreshCogsButton.addEventListener("click", async () => {
      refreshCogsButton.disabled = true;

      try {
        await loadCogList(cogSelect.value);
        setStatus("COG list refreshed.");
      } catch (error) {
        console.error(error);
        setStatus(error.message || "Could not refresh COG list.", true);
      } finally {
        refreshCogsButton.disabled = false;
      }
    });

    cogSelect.addEventListener("change", () => {
      updateExportSection(cogCatalog.get(cogSelect.value) || null);
    });

    exportCsvButton.addEventListener("click", () => triggerGridExport("csv"));
    exportDxfButton.addEventListener("click", () => triggerGridExport("dxf"));
    generate3dButton.addEventListener("click", generate3dTerrain);
    open3dButton.addEventListener("click", () => {
      const viewerUrl = open3dButton.dataset.viewerUrl;

      if (viewerUrl) {
        window.open(viewerUrl, "_blank");
      } else {
        setStatus("Generate 3D terrain first.", true);
      }
    });

    loadCogList();
    updateExportSection(null);
  </script>
</body>
</html>
